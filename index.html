<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>그린컴퓨터아카데미 수원 통합 스케줄 대시보드</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ef;
      --blue: #164ea8;
      --navy: #112e54;
      --teal: #147d73;
      --amber: #b77913;
      --red: #c83f3f;
      --violet: #6652b8;
      --soft-blue: #e8f0fe;
      --soft-teal: #e3f6f2;
      --soft-amber: #fff4d7;
      --soft-red: #fdecec;
      --soft-violet: #eeeafd;
      --shadow: 0 14px 34px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      color: var(--ink);
      background: var(--bg);
      font-family: "Pretendard", "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(135deg, rgba(22, 78, 168, 0.08), transparent 32rem),
        linear-gradient(315deg, rgba(20, 125, 115, 0.07), transparent 32rem),
        var(--bg);
    }

    button {
      font: inherit;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .shell {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .brand strong {
      display: block;
      line-height: 1.25;
    }

    .brand small {
      color: var(--teal);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.35;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .date-pill,
    .print-button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .date-pill {
      padding: 8px 13px;
      color: #314158;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
    }

    .print-button {
      padding: 8px 14px;
      border: 1px solid rgba(22, 78, 168, 0.2);
      color: #fff;
      background: var(--blue);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(22, 78, 168, 0.17);
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(460px, 1.45fr) minmax(360px, 1fr) minmax(300px, 0.82fr);
      gap: 6px;
      min-height: calc(100vh - 88px);
    }

    .panel {
      min-width: 0;
      padding: 20px;
      border: 1px solid rgba(217, 226, 239, 0.96);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-head h2 {
      font-size: 19px;
      line-height: 1.25;
    }

    .panel-head p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.teal {
      color: #0d5d55;
      background: var(--soft-teal);
      border: 1px solid rgba(20, 125, 115, 0.16);
    }

    .badge.blue {
      color: var(--blue);
      background: var(--soft-blue);
      border: 1px solid rgba(22, 78, 168, 0.16);
    }

    .badge.amber {
      color: #8f5b06;
      background: var(--soft-amber);
      border: 1px solid rgba(183, 121, 19, 0.18);
    }

    .badge.violet {
      color: var(--violet);
      background: var(--soft-violet);
      border: 1px solid rgba(102, 82, 184, 0.16);
    }

    .course-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 10px;
    }

    .filter-button {
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid rgba(164, 176, 194, 0.55);
      border-radius: 999px;
      color: #314158;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .filter-button[aria-pressed="true"] {
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      border-color: rgba(22, 78, 168, 0.2);
      box-shadow: 0 8px 16px rgba(22, 78, 168, 0.16);
    }

    .course-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .course-card,
    .next-card,
    .calendar-card,
    .timeline-card,
    .queue-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .course-card {
      min-height: 126px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      box-shadow: none;
    }

    .course-card h3 {
      margin-top: 8px;
      font-size: 16px;
      line-height: 1.25;
    }

    .mini-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .mini-metric {
      min-height: 38px;
      display: grid;
      place-items: center;
      padding: 5px;
      border-radius: 8px;
      background: #f8fbff;
      border: 1px solid var(--line);
      text-align: center;
    }

    .mini-metric span {
      color: var(--muted);
      font-size: 9px;
      font-weight: 900;
    }

    .mini-metric strong {
      font-size: 16px;
      line-height: 1;
    }

    .course-chip {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .course-chip.biz1 {
      color: #0d5d55;
      background: #b8e3dc;
    }

    .course-chip.biz2 {
      color: var(--blue);
      background: #dbe9ff;
    }

    .course-chip.student {
      color: var(--violet);
      background: #ded3fa;
    }

    .next-card {
      margin-bottom: 14px;
      padding: 18px 20px;
      color: #fff;
      background: linear-gradient(160deg, #102344, #143a65);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 38px rgba(16, 35, 68, 0.22);
    }

    .next-card h2 {
      margin-bottom: 12px;
      font-size: 19px;
    }

    .next-strip {
      display: grid;
      grid-template-columns: 86px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .next-strip span {
      color: #d8e6f7;
      font-size: 12px;
      font-weight: 800;
    }

    .next-strip strong {
      font-size: 29px;
      line-height: 1;
      white-space: nowrap;
    }

    .next-strip b {
      font-size: 14px;
      line-height: 1.35;
    }

    .next-strip small {
      color: #d8e6f7;
      font-size: 12px;
      line-height: 1.4;
    }

    .calendar-card {
      padding: 16px;
      background: rgba(255, 255, 255, 0.94);
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .calendar-head h2 {
      font-size: 18px;
    }

    .calendar-legend {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .legend-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }

    .legend-dot::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--teal);
    }

    .legend-dot.biz2::before {
      background: var(--blue);
    }

    .legend-dot.student::before {
      background: var(--violet);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 5px;
    }

    .weekday {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-align: center;
    }

    .day-cell {
      position: relative;
      min-height: 58px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }

    .day-cell.out {
      opacity: 0.32;
    }

    .day-cell.today {
      border-color: var(--red);
      box-shadow: inset 0 0 0 2px rgba(200, 63, 63, 0.14);
    }

    .day-number {
      font-size: 12px;
      font-weight: 900;
    }

    .day-dots {
      position: absolute;
      left: 7px;
      right: 7px;
      bottom: 7px;
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--teal);
    }

    .dot.biz2 {
      background: var(--blue);
    }

    .dot.student {
      background: var(--violet);
    }

    .timeline-panel,
    .queue-panel {
      max-height: calc(100vh - 102px);
      overflow-y: auto;
    }

    .timeline {
      display: grid;
      gap: 8px;
    }

    .timeline-card {
      min-height: 82px;
      padding: 14px;
      display: grid;
      grid-template-columns: 46px 78px minmax(0, 1fr) 52px;
      align-items: center;
      gap: 12px;
      background: #eef7f5;
    }

    .timeline-card.biz2 {
      background: #eaf2ff;
    }

    .timeline-card.student {
      background: #eee7fd;
    }

    .timeline-card time {
      color: var(--blue);
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
    }

    .timeline-card h3 {
      font-size: 15px;
      line-height: 1.35;
    }

    .timeline-card p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .status {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.ready {
      color: #0d5d55;
      background: #daf3ec;
    }

    .status.wait {
      color: #8f5b06;
      background: var(--soft-amber);
    }

    .status.today {
      color: #fff;
      background: var(--red);
    }

    .status.done {
      color: #314158;
      background: #edf2f7;
    }

    .queue-list {
      display: grid;
      gap: 10px;
    }

    .queue-card {
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .queue-card b {
      font-size: 14px;
      line-height: 1.35;
    }

    .queue-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 1180px) {
      .dashboard {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .timeline-panel,
      .queue-panel {
        max-height: none;
      }

      .course-cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .course-cards {
        grid-template-columns: 1fr;
      }

      .next-strip {
        grid-template-columns: 76px minmax(0, 1fr);
      }

      .next-strip .course-chip,
      .next-strip small {
        grid-column: 2;
      }

      .timeline-card {
        grid-template-columns: 52px 78px minmax(0, 1fr);
      }

      .timeline-card .status {
        grid-column: 3;
        justify-self: start;
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 24px, 1440px);
        padding-top: 12px;
      }

      .topbar,
      .panel-head,
      .next-strip,
      .timeline-card {
        display: grid;
      }

      .top-actions {
        justify-content: start;
      }

      .course-cards {
        grid-template-columns: 1fr;
      }

      .mini-metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .calendar-grid {
        gap: 4px;
      }

      .day-cell {
        min-height: 44px;
        padding: 5px;
      }
    }

    @media (max-width: 460px) {
      .shell {
        width: min(100% - 16px, 1440px);
      }

      .panel {
        padding: 14px;
      }

      .course-switch {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-button {
        width: 100%;
      }

      .mini-metrics {
        grid-template-columns: 1fr;
      }

      .calendar-head {
        display: grid;
      }

      .day-cell {
        min-height: 38px;
      }

      .day-number {
        font-size: 11px;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 9mm;
      }

      body {
        background: #fff;
        color: #111827;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .shell {
        width: 100%;
        padding: 0;
      }

      .print-button,
      .course-switch {
        display: none;
      }

      .panel,
      .course-card,
      .next-card,
      .calendar-card,
      .timeline-card,
      .queue-card {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">SC</div>
        <div>
          <strong>그린컴퓨터아카데미 수원</strong>
          <small>기맞1 + 기맞2 + 훈련이수자(출판)</small>
        </div>
      </div>
      <div class="top-actions">
        <div class="date-pill">기준일 <strong id="todayText">2026-07-10</strong></div>
        <button class="print-button" type="button" onclick="window.print()">인쇄</button>
      </div>
    </header>

    <section class="dashboard">
      <article class="panel">
        <div class="course-switch" aria-label="과정 필터">
          <button class="filter-button" type="button" data-filter="all" aria-pressed="true">전체</button>
          <button class="filter-button" type="button" data-filter="biz1" aria-pressed="false">기업맞춤 1차</button>
          <button class="filter-button" type="button" data-filter="biz2" aria-pressed="false">기업맞춤 2차</button>
          <button class="filter-button" type="button" data-filter="student" aria-pressed="false">훈련이수자 출판</button>
        </div>

        <div class="course-cards" id="courseCards"></div>

        <section class="next-card" aria-label="다음 발송 또는 확인 대상">
          <h2>다음 발송/확인 대상</h2>
          <div class="next-strip">
            <span>다가오는 일정</span>
            <strong id="nextDate">-</strong>
            <b id="nextTitle">일정 확인 중</b>
            <span id="nextMeta">과정 · 유형</span>
          </div>
        </section>

        <section class="calendar-card" aria-label="월간 일정 달력">
          <div class="calendar-head">
            <h2 id="calendarTitle">2026년 7월</h2>
            <div class="calendar-legend">
              <span class="legend-dot">기맞1</span>
              <span class="legend-dot biz2">기맞2</span>
              <span class="legend-dot student">훈련이수자</span>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>
      </article>

      <article class="panel timeline-panel">
        <div class="panel-head">
          <div>
            <h2>통합 타임라인</h2>
            <p>과정별 주요 일정과 D-day를 압축해서 봅니다.</p>
          </div>
          <span class="badge blue" id="visibleCount">0건 표시</span>
        </div>
        <div class="timeline" id="timeline"></div>
      </article>

      <aside class="panel queue-panel">
        <div class="panel-head">
          <div>
            <h2>메일 리마인드 큐</h2>
            <p>D-14, D-7, D-1, D-day 기준 발송 대상을 추립니다.</p>
          </div>
          <span class="badge amber" id="queueCount">0건</span>
        </div>
        <div class="queue-list" id="reminderQueue"></div>
      </aside>
    </section>
  </main>

  <script>
    const courses = [
      { id: "biz1", label: "기맞1", name: "기업맞춤 1차", focus: "성적결과 공유, 기업 피드백, 프로젝트 평가" },
      { id: "biz2", label: "기맞2", name: "기업맞춤 2차", focus: "출판 평가, 산업체특강, 프로젝트 진입" },
      { id: "student", label: "훈련이수자", name: "훈련이수자 출판 과정", focus: "NCS/비NCS 평가, 현장평가, 종강" }
    ];

    const events = [
      { course: "biz1", date: "2026-07-10", group: "평가", type: "성적결과", title: "성적결과 기업1 피드백 요청", detail: "피드백 완료 요청", priority: "필수" },
      { course: "biz1", date: "2026-07-13", group: "기타행사", type: "취업세미나", title: "취업세미나", detail: "참여 안내 및 준비", priority: "중요" },
      { course: "student", date: "2026-07-14", group: "운영", type: "개강/OT", title: "훈련이수자 출판 과정 개강", detail: "재량교과 개강/OT", priority: "필수" },
      { course: "biz1", date: "2026-07-15", group: "기타행사", type: "특강", title: "산업체특강3", detail: "특강 운영 리마인드", priority: "중요" },
      { course: "biz1", date: "2026-07-20", group: "평가", type: "본평가", title: "프로젝트2 본평가", detail: "디지털 교재 및 홍보 패키지 제작", priority: "필수" },
      { course: "biz1", date: "2026-07-21", group: "평가", type: "개인성과기술서", title: "프로젝트2 개인성과기술서", detail: "성과기술서 취합", priority: "필수" },
      { course: "biz1", date: "2026-07-21", group: "평가", type: "팀별역량피드백", title: "프로젝트2 팀별역량피드백", detail: "팀별 피드백 취합", priority: "필수" },
      { course: "biz2", date: "2026-07-23", group: "기타행사", type: "특강", title: "산업체특강-프1", detail: "예정", priority: "중요" },
      { course: "student", date: "2026-07-24", group: "평가", type: "본평가", title: "드로잉 이미지 편집디자인", detail: "디지털 편집디자인 기초 · NCS", priority: "필수" },
      { course: "biz1", date: "2026-07-28", group: "평가", type: "성적결과", title: "성적결과 기업2 공유", detail: "7/28 공유 후 8/4 피드백 요청", priority: "필수" },
      { course: "biz1", date: "2026-08-03", group: "기타행사", type: "발표/행사", title: "작품발표회", detail: "발표 운영 준비", priority: "중요" },
      { course: "biz2", date: "2026-08-03", group: "평가", type: "본평가", title: "[출판] 교과목7 본평가", detail: "광고 전략 기획, 디지털 광고 디자인, 브랜드 아이덴티티, 랜딩페이지/UI 시안", priority: "필수" },
      { course: "biz1", date: "2026-08-04", group: "평가", type: "성적결과", title: "성적결과 기업2 피드백 요청", detail: "피드백 완료 요청", priority: "필수" },
      { course: "biz2", date: "2026-08-04", group: "평가", type: "사전진단", title: "프로젝트1 사전진단평가", detail: "프로젝트1 진입 전 사전진단", priority: "필수" },
      { course: "student", date: "2026-08-05", group: "평가", type: "본평가", title: "사진 이미지 편집디자인", detail: "디지털 편집디자인 기초 · NCS", priority: "필수" },
      { course: "biz1", date: "2026-08-05", group: "평가", type: "성적결과", title: "성적결과 기업3 공유", detail: "기업 회신 요청", priority: "필수" },
      { course: "student", date: "2026-08-13", group: "평가", type: "본평가", title: "편집디자인 소프트웨어 활용", detail: "디지털 편집디자인 기초 · NCS", priority: "필수" },
      { course: "student", date: "2026-08-20", group: "평가", type: "본평가", title: "편집디자인 인쇄감리", detail: "디지털 편집디자인 실무 · NCS", priority: "필수" },
      { course: "student", date: "2026-08-31", group: "평가", type: "본평가", title: "편집디자인 시안제작", detail: "디지털 편집디자인 실무 · NCS", priority: "필수" },
      { course: "student", date: "2026-09-09", group: "평가", type: "본평가", title: "편집디자인 작업실행", detail: "디지털 편집디자인 실무 · NCS", priority: "필수" },
      { course: "student", date: "2026-09-15", group: "평가", type: "본평가", title: "출판 관련 법규 관리", detail: "디지털 편집 활용 · NCS", priority: "필수" },
      { course: "student", date: "2026-10-07", group: "평가", type: "본평가", title: "편집용 애플리케이션 활용", detail: "디지털 편집 활용 · NCS", priority: "필수" },
      { course: "student", date: "2026-10-26", group: "평가", type: "본평가", title: "전자출판물 제작", detail: "디지털 편집 실무 활용 · NCS", priority: "필수" },
      { course: "student", date: "2026-11-02", group: "평가", type: "본평가", title: "Firefly와 Generative Fill의 다양한 활용 방법", detail: "생성형 AI 활용 · 비NCS", priority: "필수" },
      { course: "student", date: "2026-11-10", group: "평가", type: "본평가", title: "그레이디언트를 이용한 리플릿 디자인", detail: "생성형 AI를 활용한 출판디자인 · 비NCS", priority: "필수" },
      { course: "student", date: "2026-11-17", group: "평가", type: "본평가", title: "이미지 합성과 타이포그래피를 활용한 작품 만들기", detail: "생성형 AI를 활용한 출판디자인 · 비NCS", priority: "필수" },
      { course: "student", date: "2026-11-24", group: "평가", type: "본평가", title: "디자인 요소 생성과 타이포그래피의 결합, 책 표지 디자인", detail: "생성형 AI를 활용한 출판디자인 · 비NCS", priority: "필수" },
      { course: "student", date: "2026-12-14", group: "운영", type: "현장평가", title: "훈련이수자 현장 평가", detail: "2026.12.14 14:00 예정", priority: "필수" },
      { course: "student", date: "2026-12-15", group: "운영", type: "종강", title: "훈련이수자 출판 과정 종강", detail: "작품발표/종강 흐름 관리", priority: "필수" }
    ];

    const reminderOffsets = [14, 7, 1, 0];
    let activeFilter = "all";

    const today = new Date();
    const dayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const parseLocalDate = (value) => {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    };
    const formatDate = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };
    const formatShortDate = (value) => {
      const date = parseLocalDate(value);
      return `${date.getMonth() + 1}/${date.getDate()}`;
    };
    const diffDays = (target) => Math.round((parseLocalDate(target) - dayOnly) / 86400000);
    const ddayText = (target) => {
      const d = diffDays(target);
      if (d === 0) return "오늘";
      return d > 0 ? `D-${d}` : `완료`;
    };
    const statusClass = (target) => {
      const d = diffDays(target);
      if (d === 0) return "today";
      if (d < 0) return "done";
      return d <= 7 ? "wait" : "ready";
    };
    const courseById = (id) => courses.find((course) => course.id === id) || courses[0];
    const sortedEvents = [...events].sort((a, b) => parseLocalDate(a.date) - parseLocalDate(b.date));
    const filteredEvents = () => sortedEvents.filter((event) => activeFilter === "all" || event.course === activeFilter);

    function renderCourseCards() {
      const grid = document.getElementById("courseCards");
      grid.innerHTML = courses.map((course) => {
        const courseEvents = sortedEvents.filter((event) => event.course === course.id);
        const upcoming = courseEvents.filter((event) => diffDays(event.date) >= 0);
        const required = courseEvents.filter((event) => event.priority === "필수").length;
        const next = upcoming[0] || courseEvents[courseEvents.length - 1];
        return `
          <article class="course-card">
            <div>
              <span class="course-chip ${course.id}">${course.label}</span>
              <h3>${course.name}</h3>
            </div>
            <div class="mini-metrics">
              <div class="mini-metric"><span>주요일정</span><strong>${courseEvents.length}</strong></div>
              <div class="mini-metric"><span>필수</span><strong>${required}</strong></div>
              <div class="mini-metric"><span>다음일정</span><strong>${next ? formatShortDate(next.date) : "-"}</strong></div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderTimeline() {
      const items = filteredEvents();
      document.getElementById("visibleCount").textContent = `${items.length}건 표시`;
      document.getElementById("timeline").innerHTML = items.map((item) => {
        const course = courseById(item.course);
        return `
          <article class="timeline-card ${course.id}">
            <time>${formatShortDate(item.date)}</time>
            <span class="course-chip ${course.id}">${course.label}</span>
            <div>
              <h3>${item.title}</h3>
              <p>${item.group} · ${item.type} · ${item.detail}</p>
            </div>
            <span class="status ${statusClass(item.date)}">${ddayText(item.date)}</span>
          </article>
        `;
      }).join("");
    }

    function renderReminderQueue() {
      const queue = filteredEvents()
        .filter((event) => reminderOffsets.includes(diffDays(event.date)) && ["필수", "중요"].includes(event.priority));
      document.getElementById("queueCount").textContent = `${queue.length}건`;
      document.getElementById("reminderQueue").innerHTML = queue.length ? queue.map((event) => {
        const course = courseById(event.course);
        const days = diffDays(event.date);
        const stage = days === 0 ? "D-day" : `D-${days}`;
        return `
          <article class="queue-card">
            <span class="course-chip ${course.id}">${course.label}</span>
            <b>${stage} 메일 발송: ${event.title}</b>
            <span>${formatShortDate(event.date)} · ${event.type} · ${event.priority}</span>
          </article>
        `;
      }).join("") : `
        <article class="queue-card">
          <b>오늘 발송 대상 없음</b>
          <span>선택한 과정 기준 D-14, D-7, D-1, D-day에 해당하는 필수/중요 일정이 없습니다.</span>
        </article>
      `;
    }

    function renderNextEvent() {
      const upcoming = filteredEvents().find((event) => diffDays(event.date) >= 0) || filteredEvents()[0];
      if (!upcoming) return;
      const course = courseById(upcoming.course);
      document.getElementById("nextDate").textContent = formatShortDate(upcoming.date);
      document.getElementById("nextTitle").textContent = upcoming.title;
      document.getElementById("nextMeta").innerHTML = `<span class="course-chip ${course.id}">${course.label}</span><small>${upcoming.type} · ${ddayText(upcoming.date)}</small>`;
    }

    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      const base = new Date(dayOnly.getFullYear(), dayOnly.getMonth(), 1);
      const year = base.getFullYear();
      const month = base.getMonth();
      const first = new Date(year, month, 1);
      const start = new Date(year, month, 1 - first.getDay());
      const monthEvents = sortedEvents.filter((event) => {
        const date = parseLocalDate(event.date);
        return date.getFullYear() === year && date.getMonth() === month && (activeFilter === "all" || event.course === activeFilter);
      });
      const byDay = new Map();
      monthEvents.forEach((event) => {
        const key = String(parseLocalDate(event.date).getDate());
        byDay.set(key, [...(byDay.get(key) || []), event]);
      });
      document.getElementById("calendarTitle").textContent = `${year}년 ${month + 1}월`;
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"].map((day) => `<div class="weekday">${day}</div>`).join("");
      const cells = Array.from({ length: 42 }, (_, index) => {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const inMonth = date.getMonth() === month;
        const isToday = formatDate(date) === formatDate(dayOnly);
        const dayEvents = byDay.get(String(date.getDate())) || [];
        const dots = dayEvents.slice(0, 5).map((event) => `<span class="dot ${event.course}"></span>`).join("");
        return `
          <div class="day-cell ${inMonth ? "" : "out"} ${isToday ? "today" : ""}">
            <span class="day-number">${date.getDate()}</span>
            <div class="day-dots">${dots}</div>
          </div>
        `;
      }).join("");
      grid.innerHTML = weekdays + cells;
    }

    function renderAll() {
      document.getElementById("todayText").textContent = formatDate(dayOnly);
      renderCourseCards();
      renderTimeline();
      renderReminderQueue();
      renderNextEvent();
      renderCalendar();
    }

    document.querySelectorAll(".filter-button").forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter || "all";
        document.querySelectorAll(".filter-button").forEach((item) => item.setAttribute("aria-pressed", "false"));
        button.setAttribute("aria-pressed", "true");
        renderTimeline();
        renderReminderQueue();
        renderNextEvent();
        renderCalendar();
      });
    });

    renderAll();
  </script>
</body>
</html>
